<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login | TECHNOVA GT
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- ===================================== -->
    <!-- LOGIN -->
    <!-- ===================================== -->

    <div class="container-form">


        <form
            class="formulario"
            onsubmit="login(event)"
        >


            <h1>

                Iniciar Sesión

            </h1>


            <input
                type="email"
                id="correo"
                placeholder="Correo"
                required
            >


            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >


            <button type="submit">

                Ingresar

            </button>


            <p>

                ¿No tienes cuenta?

                <a href="register.html">

                    Registrarse

                </a>

            </p>


        </form>


    </div>



    <!-- ===================================== -->
    <!-- SCRIPTS -->
    <!-- ===================================== -->

    <script src="app.js"></script>

    <script src="login.js"></script>

</body>

</html>
