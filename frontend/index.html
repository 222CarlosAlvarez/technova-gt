<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        TECHNOVA GT
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- HEADER -->

    <header class="header">


        <h1>
            TECHNOVA GT
        </h1>


        <nav id="navPrincipal">


            <a href="index.html">
                Inicio
            </a>


            <a href="tienda.html">
                Tienda
            </a>


            <a href="carrito.html">
                Carrito
            </a>


            <a href="historial.html">
                Historial
            </a>


            <a href="perfil.html">
                Perfil
            </a>


            <span id="adminLinks">

            </span>


            <span id="authLinks">


                <a href="login.html">
                    Iniciar Sesión
                </a>


                <a href="register.html">
                    Registrarse
                </a>


            </span>


        </nav>


    </header>



    <!-- HERO -->

    <section class="hero">


        <h2>
            Bienvenido a TECHNOVA GT
        </h2>


        <p>
            Tecnología, componentes y accesorios
            al mejor precio.
        </p>


        <a
            href="tienda.html"
            class="btn-principal"
        >
            Ir a la Tienda
        </a>


    </section>



    <!-- PRODUCTOS DESTACADOS -->

    <main class="container">


        <h2>
            Productos Destacados
        </h2>


        <div
            id="productosDestacados"
            class="productos-grid"
        >

        </div>


    </main>



    <!-- FOOTER -->

    <footer class="footer">


        <p>
            © 2026 TECHNOVA GT
        </p>


    </footer>



    <script src="app.js"></script>


    <script>


        // ======================================
        // CARGAR PRODUCTOS
        // ======================================

        async function cargarProductos(){


            try{

                const respuesta =
                await fetch(

                    `${API}/productos`

                );


                const productos =
                await respuesta.json();


                const contenedor =
                document.getElementById(
                    "productosDestacados"
                );


                contenedor.innerHTML =
                "";


                productos.slice(0,6).forEach((producto)=>{


                    contenedor.innerHTML += `

                        <div class="card-producto">


                            <img
                                src="${producto.imagen}"
                                alt="${producto.nombre}"
                            >


                            <h3>
                                ${producto.nombre}
                            </h3>


                            <p>
                                Categoría:
                                ${producto.categoria}
                            </p>


                            <p>
                                Precio:
                                Q${producto.precio}
                            </p>


                            <a
                                href="tienda.html"
                            >
                                <button>
                                    Ver Producto
                                </button>
                            </a>


                        </div>

                    `;

                });

            }catch(error){

                console.log(error);

            }

        }



        // ======================================
        // MOSTRAR LINKS SEGÚN LOGIN
        // ======================================

        function mostrarSesion(){


            const usuario =
            obtenerUsuario();


            const authLinks =
            document.getElementById(
                "authLinks"
            );


            const adminLinks =
            document.getElementById(
                "adminLinks"
            );


            if(usuario){


                authLinks.innerHTML = `

                    <button onclick="cerrarSesion()">
                        Cerrar Sesión
                    </button>

                `;


                // ADMIN
                if(usuario.rol === "admin"){


                    adminLinks.innerHTML = `

                        <a href="admin.html">
                            Administrador
                        </a>


                        <a href="inventario.html">
                            Inventario
                        </a>

                    `;

                }

            }

        }



        // ======================================
        // INICIO
        // ======================================

        cargarProductos();

        mostrarSesion();


    </script>

</body>

</html>
