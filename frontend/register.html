<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Registro
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- HEADER -->

    <header class="header">


        <h1>
            TECHNOVA GT
        </h1>


        <nav>

            <a href="index.html">
                Inicio
            </a>

            <a href="tienda.html">
                Tienda
            </a>

            <a href="login.html">
                Iniciar Sesión
            </a>

        </nav>


    </header>



    <!-- FORMULARIO -->

    <main class="container">


        <div class="form-login">


            <h2>
                Crear Cuenta
            </h2>



            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
            >



            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
            >



            <input
                type="password"
                id="password"
                placeholder="Contraseña"
            >



            <!-- ROL -->

            <select
                id="rol"
                onchange="mostrarClaveAdmin()"
            >

                <option value="usuario">
                    Usuario
                </option>

                <option value="admin">
                    Administrador
                </option>

            </select>



            <!-- CLAVE ADMIN -->

            <div
                id="divClaveAdmin"
                style="display:none;"
            >


                <input
                    type="password"
                    id="claveAdmin"
                    placeholder="Clave Administrador"
                >


            </div>



            <button onclick="register()">
                Registrarse
            </button>



            <p>

                ¿Ya tienes cuenta?

                <a href="login.html">
                    Iniciar Sesión
                </a>

            </p>


        </div>


    </main>



    <script src="app.js"></script>

    <script src="register.js"></script>

</body>

</html>
