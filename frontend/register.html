<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Registro | TECHNOVA GT
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- ===================================== -->
    <!-- REGISTRO -->
    <!-- ===================================== -->

    <div class="container-form">


        <form
            class="formulario"
            onsubmit="register(event)"
        >


            <h1>

                Crear Cuenta

            </h1>


            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required
            >


            <input
                type="email"
                id="correo"
                placeholder="Correo electrónico"
                required
            >


            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >


            <select
                id="rol"
                onchange="mostrarClaveAdmin()"
            >

                <option value="user">

                    Usuario

                </option>

                <option value="admin">

                    Administrador

                </option>

            </select>


            <input
                type="password"
                id="claveAdmin"
                placeholder="Clave Administrador"
                style="display:none;"
            >


            <button type="submit">

                Registrarse

            </button>


            <p>

                ¿Ya tienes cuenta?

                <a href="login.html">

                    Iniciar Sesión

                </a>

            </p>


        </form>


    </div>



    <!-- ===================================== -->
    <!-- SCRIPTS -->
    <!-- ===================================== -->

    <script src="app.js"></script>

    <script src="register.js"></script>

</body>

</html>
