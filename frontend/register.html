<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registro - TECHNOVA GT</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>


<!-- =========================
NAVBAR
========================= -->

<header class="navbar">

    <h1>

    TECHNOVA GT

    </h1>

    <div>

        <a href="index.html">

            <button>

                Inicio

            </button>

        </a>

        <a href="login.html">

            <button>

                Login

            </button>

        </a>

    </div>

</header>


<!-- =========================
REGISTER
========================= -->

<section class="login-container">

    <h1>

    Crear Cuenta

    </h1>


    <input
    type="text"
    id="nombre"
    placeholder="Nombre completo">


    <input
    type="email"
    id="correo"
    placeholder="Correo electrónico">


    <input
    type="password"
    id="password"
    placeholder="Contraseña">


    <select id="rol">

        <option value="user">

            Usuario

        </option>

        <option value="admin">

            Administrador

        </option>

    </select>


    <!-- CLAVE ADMIN -->
    <div id="adminBox"
    style="display:none;">

        <input
        type="password"
        id="claveAdmin"
        placeholder="Clave de administrador">

    </div>


    <button onclick="register()">

        Registrarse

    </button>


    <p>

        ¿Ya tienes cuenta?

        <a href="login.html">

            Iniciar sesión

        </a>

    </p>

</section>


<script src="app.js"></script>
<script src="register.js"></script>

</body>
</html>
