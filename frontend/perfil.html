href="style.css">

</head>

<!-- =========================

    <h1>

    Mi Perfil

    <div>

        <a href="index.html">

            <button>

                Inicio

            </button>

        <a href="tienda.html">

</header>


<!-- =========================
PERFIL
========================= -->

<section class="perfil">


    <h1>

    Información del Usuario

    </h1>


    <div class="perfil-info">

        <p>

            <strong>Nombre:</strong>

            <span id="nombre">

            </span>

        </p>


        <p>

            <strong>Correo:</strong>

            <span id="correo">

            </span>

        </p>


        <p>

            <strong>Rol:</strong>

            <span id="rol">

            </span>

        </p>

    </div>


</section>


<!-- =========================
RESUMEN COMPRAS
========================= -->

<section class="perfil">

    <h1>

    Resumen de Compras

    </h1>


    <p>

        Compras realizadas:

        <strong id="cantidadCompras">

        0

        </strong>

    </p>


    <p>

        Total gastado:

        <strong id="totalGastado">

        Q0.00

        </strong>

    </p>

</section>


<!-- =========================
ULTIMAS COMPRAS
========================= -->

<section class="perfil">

    <h1>

    Últimas Compras

    </h1>

    <div id="ultimasCompras">

    </div>

</section>


<script src="app.js"></script>
