<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Perfil
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- HEADER -->

    <header class="header">


        <h1>
            TECHNOVA GT
        </h1>


        <nav>

            <a href="index.html">
                Inicio
            </a>

            <a href="tienda.html">
                Tienda
            </a>

            <a href="carrito.html">
                Carrito
            </a>

            <a href="historial.html">
                Historial
            </a>

            <button onclick="cerrarSesion()">
                Cerrar Sesión
            </button>

        </nav>


    </header>



    <!-- CONTENIDO -->

    <main class="container">


        <section class="perfil-container">


            <h2>
                Mi Perfil
            </h2>


            <div class="perfil-card">


                <p>

                    <strong>
                        Nombre:
                    </strong>

                    <span id="nombreUsuario">

                    </span>

                </p>


                <p>

                    <strong>
                        Correo:
                    </strong>

                    <span id="correoUsuario">

                    </span>

                </p>


                <p>

                    <strong>
                        Rol:
                    </strong>

                    <span id="rolUsuario">

                    </span>

                </p>


            </div>


        </section>



        <!-- RESUMEN COMPRAS -->

        <section class="perfil-compras">


            <h2>
                Resumen de Compras
            </h2>


            <div class="resumen-box">


                <h3>

                    Compras realizadas:

                    <span id="cantidadCompras">
                        0
                    </span>

                </h3>


                <h3>

                    Total gastado:

                    <span id="totalGastado">
                        Q0
                    </span>

                </h3>


            </div>


        </section>



        <!-- HISTORIAL -->

        <section>


            <h2>
                Últimas Compras
            </h2>


            <div
                id="historialPerfil"
                class="productos-grid"
            >

            </div>


        </section>


    </main>



    <script src="app.js"></script>

    <script src="perfil.js"></script>

</body>

</html>
