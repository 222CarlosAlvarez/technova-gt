<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Panel Administrador
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>


    <!-- HEADER -->

    <header class="header">


        <h1>
            TECHNOVA GT - ADMIN
        </h1>


        <nav>

            <a href="index.html">
                Inicio
            </a>

            <a href="tienda.html">
                Tienda
            </a>

            <a href="inventario.html">
                Inventario
            </a>

            <a href="perfil.html">
                Perfil
            </a>

            <button onclick="cerrarSesion()">
                Cerrar Sesión
            </button>

        </nav>


    </header>



    <!-- CONTENIDO -->

    <main class="container">


        <section class="form-admin">


            <h2>
                Agregar Producto
            </h2>


            <input
                type="text"
                id="nombre"
                placeholder="Nombre producto"
            >


            <input
                type="number"
                id="precio"
                placeholder="Precio"
            >


            <input
                type="number"
                id="cantidad"
                placeholder="Cantidad"
            >


            <input
                type="text"
                id="categoria"
                placeholder="Categoría"
            >


            <input
                type="text"
                id="imagen"
                placeholder="URL Imagen"
            >


            <button onclick="agregarProducto()">
                Agregar Producto
            </button>


        </section>



        <section>


            <h2>
                Productos Registrados
            </h2>


            <div
                id="productosAdmin"
                class="productos-grid"
            >

            </div>


        </section>


    </main>



    <script src="app.js"></script>

    <script src="admin.js"></script>

</body>

</html>
